<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>保健体育 クイズアプリ</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 30px;
            width: 100%;
            max-width: 650px;
            box-sizing: border-box;
        }
        h1, h2 {
            text-align: center;
            color: #4a90e2;
        }
        .hidden {
            display: none !important;
        }
        button {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            background-color: #4a90e2;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #357abd;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .history-list {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 10px;
        }
        .feedback-area {
            background-color: #fdfdfd;
            border: 2px dashed #ddd;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            text-align: center;
        }
        .correct { color: #2ecc71; font-weight: bold; font-size: 20px; }
        .incorrect { color: #e74c3c; font-weight: bold; font-size: 20px; }
        .exp { font-size: 14px; color: #666; margin-top: 8px; text-align: left; line-height: 1.5; }
        
        .toggle-btn {
            width: auto;
            display: inline-block;
            padding: 6px 12px;
            margin: 10px auto 0 auto;
            font-size: 13px;
            background-color: #6c757d;
        }
        .toggle-btn:hover {
            background-color: #5a6268;
        }
        .quit-btn {
            background-color: #e74c3c;
            margin-top: 25px;
            font-size: 14px;
            padding: 8px;
        }
        .quit-btn:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="home-screen">
        <h1>保健体育 クイズアプリ</h1>
        <button id="start-normal-btn">通常のクイズを始める</button>
        <button id="start-wrong-btn" disabled>間違えた問題のみ取り組む</button>
        
        <h3>📊 結果の推移</h3>
        <div id="history-container" class="history-list">まだ履歴はありません。</div>
    </div>

    <div id="quiz-screen" class="hidden">
        <h2 id="quiz-progress">第 1 問</h2>
        <p id="quiz-question" style="font-size: 18px; font-weight: bold; line-height: 1.6;"></p>
        
        <input type="text" id="answer-input" placeholder="答えを入力してください" autocomplete="off">
        <button id="submit-btn">回答する</button>

        <div id="feedback-container" class="feedback-area hidden">
            <div id="feedback-status"></div>
            <div id="feedback-correct-ans" style="margin-top: 5px; font-size: 14px; line-height: 1.4;"></div>
            <button id="toggle-judgment-btn" class="toggle-btn">判定を覆す</button>
            <div id="feedback-exp" class="exp"></div>
            <button id="next-btn" style="background-color: #2ecc71; margin-top: 15px;">次の問題へ</button>
        </div>

        <button id="quit-btn" class="quit-btn">途中で退出する（ここまでの結果を記録）</button>
    </div>

    <div id="result-screen" class="hidden">
        <h2>結果発表</h2>
        <p id="result-score" style="text-align: center; font-size: 20px; font-weight: bold;"></p>
        <button id="back-home-btn">ホームに戻る</button>
    </div>
</div>

<script>
    const Quiz = [
        // 現代生活と私達の心と体
        { id: 1, q: "現代社会では●●が発達し、△△化が進みました。その結果私達は■■不足になりがちになりました。●●に入る単語を答えよ", ans: ["交通", "こうつう"], exp: "教科書の「現代生活と私達の心と体」より。" },
        { id: 2, q: "現代社会では●●が発達し、△△化が進みました。その結果私達は■■不足になりがちになりました。△△に入る単語を答えよ", ans: ["機械", "きかい"], exp: "交通機関や機械化の発達が背景にあります。" },
        { id: 3, q: "現代社会では●●が発達し、△△化が進みました。その結果私達は■■不足になりがちになりました。■■に入る単語を答えよ", ans: ["運動", "うんどう"], exp: "生活が便利になった反面、運動不足が問題視されています。" },
        { id: 4, q: "現代社会では●●化が進展しさらに仕事の忙しさや、△△△△の複雑さなどによって■■を抱えやすくなりました。●●に入る単語を答えよ", ans: ["情報", "じょうほう"], exp: "情報化社会の進展に伴う環境の変化です。" },
        { id: 5, q: "現代社会では●●化が進展しさらに仕事の忙しさや、△△△△の複雑さなどによって■■を抱えやすくなりました。△△△△に入る単語を答えよ", ans: ["人間関係", "にんげんかんけい"], exp: "社会構造の変化で人間関係の悩みも複雑化しています。" },
        { id: 6, q: "現代社会では●●化が進展しさらに仕事の忙しさや、△△△△の複雑さなどによって■■■■を抱えやすくなりました。■■■■に入る単語を答えよ", ans: ["ストレス"], exp: "心への過度な負担がストレスを生み出します。" },
        
        // 生活を豊かにするスポーツ
        { id: 7, q: "スポーツに親しむことによって●●●●●●を作ったり、△△△△△△△出会いや、豊かな交流を行うことができます。●●●●●●に入る単語を答えよ", ans: ["健康な心と体", "健康な心や体"], exp: "スポーツは心身の健康づくりに役立ちます。" },
        { id: 8, q: "スポーツに親しむことによって●●●●●●を作ったり、△△△△△△△出会いや、豊かな交流を行うことができます。△△△△△△△に入る単語を答えよ", ans: ["新しい自分との", "新たな自分との"], exp: "自己の可能性の発見につながります。" },
        { id: 9, q: "UNESCOの正式名称を漢字で答えよ", ans: ["国際連合教育科学文化機関"], exp: "United Nations Educational, Scientific and Cultural Organization" },
        { id: 10, q: "UNESCOとはどのような組織か（簡潔に）", ans: ["国際平和と人類の福祉の促進を目的とした国際連合の専門機関", "国際連合の専門機関"], exp: "国際平和と人類の福祉の促進を目的とした専門機関です。" },
        { id: 11, q: "UNESCOはどのようなことをすることが●●だと呼びかけていますか（順番に、読点で繋いで答えよ）", ans: ["体育、身体活動、スポーツの実践をすることが基本的権利", "体育、身体活動、スポーツの実践"], exp: "これらをすることが「基本的権利」であると提唱されています。" },
        { id: 12, q: "2011年に制定された、日本におけるスポーツの施策の基本事項を定めた法律を何というか", ans: ["スポーツ基本法"], exp: "それまでのスポーツ振興法を全面的に改正して制定されました。" },
        { id: 13, q: "日本のスポーツ政策の方向性を定める国の重要な指針を何というか", ans: ["スポーツ基本計画"], exp: "スポーツ基本法に基づき、文部科学大臣が策定する計画です。" },

        // 感染症と病原体
        { id: 14, q: "ウイルスや細菌などの病気を引き起こす微生物を何というか", ans: ["病原菌", "病原体"], exp: "顕微鏡でしか見えない小さな生物たちです。" },
        { id: 15, q: "病原体が体内に侵入後、増殖することを何というか", ans: ["感染", "かんせん"], exp: "侵入するだけでなく、体内で増えることを指します。" },
        { id: 16, q: "病原体に感染し、発病するまでの期間を何というか", ans: ["潜伏期間", "せんぷきかん"], exp: "この期間は病原体の種類によって異なります。" },
        { id: 17, q: "体に異常が出ることを何というか", ans: ["発病", "はつびょう"], exp: "潜伏期間を経て症状が現れることです。" },
        { id: 18, q: "病原体が原因である病気のことを何というか", ans: ["感染症", "感染病", "かんせんしょう"], exp: "他者へうつる可能性のある疾患群です。" },
        { id: 19, q: "主な感染経路を4つ答えよ（読点で繋いで答えよ）", ans: ["飛沫、接触、媒介、空気", "飛沫・接触・媒介・空気"], exp: "飛沫感染、接触感染、媒介物感染、空気感染が基本です。" },

        { id: 20, q: "インフルエンザの主な症状は何か", ans: ["咳、鼻水、くしゃみ、発熱、筋肉痛"], exp: "突発的な高熱や全身症状が特徴です。" },
        { id: 21, q: "インフルエンザの潜伏期間はどのくらいか", ans: ["1〜3日", "1-3日", "1から3日"], exp: "比較的短い潜伏期間で急激に発症します。" },

        { id: 23, q: "麻しん（はしか）の潜伏期間はどのくらいか", ans: ["10〜12日", "10-12日", "10から12日"], exp: "およそ10日前後です。" },

        { id: 25, q: "風しんの潜伏期間はどのくらいか", ans: ["14〜21日", "14-21日", "14から21日"], exp: "2〜3週間程度です。" },
        { id: 26, q: "結核の主な症状は何か", ans: ["咳、痰、発熱"], exp: "長引く咳や痰がサインとなる呼吸器の感染症です。" },
        { id: 27, q: "結核の潜伏期間はどのくらいか", ans: ["1か月〜10年以上", "1ヶ月〜10年以上"], exp: "非常に長く、体内で眠り続けることがあります。" },
        { id: 28, q: "感染性胃腸炎の主な症状は何か", ans: ["下痢、嘔吐、発熱"], exp: "ノロウイルスやロタウイルスなどが有名です。" },
        { id: 29, q: "感染性胃腸炎の潜伏期間はどのくらいか", ans: ["1〜2日", "1-2日", "主に1〜2日"], exp: "1〜2日で急激な症状が出ます。" },
        { id: 30, q: "コレラの主な症状は何か", ans: ["激しい下痢、嘔吐"], exp: "米のとぎ汁のような大量の水様便が出ます。" },
        { id: 31, q: "コレラの潜伏期間はどのくらいか", ans: ["1日", "およそ1日"], exp: "非常に短いのが特徴です。" },
        { id: 32, q: "マラリアの主な症状は何か", ans: ["高熱、筋肉痛、嘔吐"], exp: "蚊（ハマダラカ）を媒介して感染します。" },
        { id: 33, q: "マラリアの潜伏期間はどのくらいか", ans: ["1週間以上"], exp: "一般的に1週間から数週間です。" },
        { id: 34, q: "デング熱の主な症状は何か", ans: ["急激な発熱、発しん、頭痛、嘔吐", "急激な発熱、発疹、頭痛、嘔吐"], exp: "蚊（ヒトスジシマカなど）に刺されることで感染します。" },
        { id: 35, q: "デング熱の潜伏期間はどのくらいか", ans: ["2〜14日", "2-14日"], exp: "およそ2日から2週間以内です。" },
        { id: 36, q: "COVID-19の主な症状は何か", ans: ["咳、発熱、重症時は呼吸困難など"], exp: "新型コロナウイルスによる感染症です。" },
        { id: 37, q: "COVID-19の潜伏期間はどのくらいか", ans: ["1〜14日", "1-14日"], exp: "オミクロン株など変異により前後しますが多くは1〜14日以内です。" },

        // 免疫・抵抗力
        { id: 38, q: "病原体の侵入を防いだり、排除したりする力を何というか", ans: ["抵抗力", "たいこうりょく"], exp: "私たちの体に備わっている防御壁です。" },
        { id: 39, q: "抵抗力が低下しているときはどうなるか", ans: ["感染しやすかったり、症状が重くなったりする"], exp: "病気にかかりやすく、また長引きやすくなります。" },
        { id: 40, q: "抵抗力の一つで病原体等の異物を体外へ排除する働きを何というか", ans: ["免疫", "めんえき"], exp: "一度戦った相手を記憶する高度な仕組みを持っています。" },
        { id: 41, q: "病に感染した経験によって免疫の機能はどうなるか", ans: ["強化される"], exp: "同じ病原体に対して強い対抗手段を得ます。" },
        { id: 42, q: "免疫の仕組みにおいて、マクロファージ（白血球）が病原体を食べた後に最初に行うことは何か", ans: ["ヘルパーT細胞に病原体の情報を伝える"], exp: "敵の情報を司令官に伝達します（抗原提示）。" },
        { id: 43, q: "マクロファージから情報を受け取ったヘルパーT細胞は何をするか", ans: ["B細胞が抗体をつくるよう指令を出す", "B細胞が抗体を作るよう指令を出す"], exp: "攻撃の要である武器職人（B細胞）に命令を下します。" },
        { id: 44, q: "ヘルパーT細胞から指令を受けたB細胞は何をするか", ans: ["抗体を出して病原体を攻撃する", "抗体を作って病原体を攻撃する"], exp: "ピンポイントで敵を無力化する特効薬（抗体）を放ちます。" },
        { id: 45, q: "免疫の反応が一度起きると、体の中に何が残るか", ans: ["十分な記憶", "記憶"], exp: "免疫記憶の働きにより、再感染を防ぎます。" },
        { id: 46, q: "一度感染した病原体が再び入ってきたとき、免疫のしくみはどう動くか", ans: ["すみやかに動く", "速やかに動く"], exp: "記憶があるため、初期段階で一気に叩き潰します。" },
        
        // 生活習慣・環境・予防接種
        { id: 47, q: "抵抗力を高める生活習慣として、食事はどのようにすればよいか", ans: ["バランスのよい食事", "バランスの良い食事"], exp: "多種多様な栄養が細胞を元気にします。" },

        { id: 49, q: "抵抗力を高める生活習慣として、運動はどのようにすればよいか", ans: ["適度な運動"], exp: "激しすぎず、心地よいレベルの運動が理想です。" },
        { id: 50, q: "抵抗力を低下させる原因となる、過度なものは何か（2つ）", ans: ["運動、労働", "運動と労働"], exp: "働きすぎや過度なトレーニングは体を壊します。" },
        { id: 51, q: "抵抗力を低下させる原因となる、精神的な負荷は何か", ans: ["ストレス"], exp: "過度なストレスは自律神経と免疫を狂わせます。" },
        { id: 52, q: "抵抗力を低下させる原因となる、嗜好品の過剰摂取などは何か", ans: ["飲酒喫煙、薬物乱用など", "飲酒喫煙、薬物乱用"], exp: "健康な細胞に毒素を注ぎ込む行為です。" },
        { id: 53, q: "感染症のリスクを低下させるために充実させるべき医療の制度は何か", ans: ["治療法や予防法", "治療法と予防法"], exp: "医学の進歩と制度の行き届きが大切です。" },
        { id: 54, q: "感染症のリスクを低下させるために改善すべき環境は何か", ans: ["栄養環境や労働環境", "栄養環境と労働環境"], exp: "社会全体の生活・労働水準を高める必要があります。" },
        { id: 55, q: "免疫のしくみを利用して、抵抗力（抗体）をつくりだす方法を何というか", ans: ["予防接種", "ワクチン接種"], exp: "あらかじめ安全な偽物の敵を入れて練習させる手法です。" },
        { id: 56, q: "予防接種を受けた本人はどうなるか", ans: ["感染しにくくなるだけでなく、感染しても発病しにくくなる"], exp: "発症や重症化を防ぐ高い効果があります。" },
        { id: 57, q: "予防接種において、インフルエンザの対象（義務か任意か）はどうなっているか", ans: ["任意"], exp: "希望者が各自で受ける形になります。" },
        { id: 58, q: "予防接種において、麻しん・風しんの対象はどうなっているか", ans: ["全員", "定期"], exp: "公費による定期接種の対象であり、原則全員が受けます。" },
        { id: 59, q: "予防接種において、結核（BCG）の対象はどうなっているか", ans: ["全員", "定期"], exp: "日本の定期接種スケジュールに含まれます。" },
        { id: 60, q: "インフルエンザの予防接種の回数はどのように決まるか", ans: ["毎シーズン流行前。年齢により回数が異なる。", "年齢により回数が異なる"], exp: "ウイルスの型が毎年変わるため毎シーズン受けます。" },
        { id: 61, q: "麻しん・風しんの予防接種の回数はどのようになっているか", ans: ["1歳時と小学校入学前の2回", "2回"], exp: "免疫をより確実にするため、2回に分けて摂取します。" },
        { id: 62, q: "結核（BCG）の予防接種の回数はどのようになっているか", ans: ["0歳時に1回", "1回"], exp: "乳幼児期の重症化を防ぐため、生後1年未満に行います。" },
        { id: 63, q: "インフルエンザの予防接種の内容・特徴は何か", ans: ["その年に流行すると予測される4種類程度のウイルスに備える。"], exp: "予測を立ててワクチン株が選定されます。" },
        { id: 64, q: "麻しん・風しんの予防接種の内容・特徴は何か", ans: ["麻しんと風しん両方のワクチンが入っている。"], exp: "一般的にMR混合ワクチンと呼ばれます。" },
        { id: 65, q: "結核（BCG）の予防接種の内容・特徴は何か", ans: ["スタンプ状の注射のため「はんこ注射」と呼ばれることもある。"], exp: "9本の管針を押し当てる独特の形状です。" },

        // 三大対策

        { id: 98, q: "性感染症を広げないために何がなにより大切か", ans: ["予防", "よぼう"], exp: ["正しい知識に基づいた事前の予防が最大の武器です。" ]},
    ];

    let currentQuizSet = []; 
    let currentQuestionIndex = 0; 
    let wrongQuizIds = []; 
    let scoreHistory = []; 

    const homeScreen = document.getElementById('home-screen');
    const quizScreen = document.getElementById('quiz-screen');
    const resultScreen = document.getElementById('result-screen');
    
    const startNormalBtn = document.getElementById('start-normal-btn');
    const startWrongBtn = document.getElementById('start-wrong-btn');
    const backHomeBtn = document.getElementById('back-home-btn');
    const submitBtn = document.getElementById('submit-btn');
    const quitBtn = document.getElementById('quit-btn');
    
    const quizProgress = document.getElementById('quiz-progress');
    const quizQuestion = document.getElementById('quiz-question');
    const answerInput = document.getElementById('answer-input');
    
    const feedbackContainer = document.getElementById('feedback-container');
    const feedbackStatus = document.getElementById('feedback-status');
    const feedbackCorrectAns = document.getElementById('feedback-correct-ans');
    const toggleJudgmentBtn = document.getElementById('toggle-judgment-btn');
    const feedbackExp = document.getElementById('feedback-exp');
    const nextBtn = document.getElementById('next-btn');

    const resultScore = document.getElementById('result-score');
    const historyContainer = document.getElementById('history-container');

    // 配列をランダムにシャッフルする関数 (Fisher-Yatesシャッフル)
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // 全角を半角、一部の記号（〜や-）を標準化
    function toHalfWidth(str) {
        return str.replace(/[Ａ-Ｚａ-ｚ０-９]/g, function(s) {
            return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
        }).replace(/[〜－ー]/g, '-').replace(/[、，]/g, ','); 
    }

    // 文字列の標準化
    function normalizeStr(str) {
        if (!str) return '';
        return toHalfWidth(str.toString().trim().toLowerCase()).replace(/\s+/g, '');
    }

    function startQuiz(mode) {
        if (mode === 'normal') {
            currentQuizSet = [...Quiz];
        } else if (mode === 'wrong') {
            currentQuizSet = Quiz.filter(q => wrongQuizIds.includes(q.id));
        }

        // 開始時に問題をシャッフル
        currentQuizSet = shuffleArray(currentQuizSet);

        currentQuestionIndex = 0;
        
        // 判定が上書きされるケースなどを考慮し、クイズセットに含まれる問題のuserResultを一旦クリア
        currentQuizSet.forEach(q => delete q.userResult);

        homeScreen.classList.add('hidden');
        resultScreen.classList.add('hidden');
        quizScreen.classList.remove('hidden');
        
        showQuestion();
    }

    function showQuestion() {
        const currentQuestion = currentQuizSet[currentQuestionIndex];
        quizProgress.textContent = `第 ${currentQuestionIndex + 1} 問 / 全 ${currentQuizSet.length} 問`;
        quizQuestion.textContent = currentQuestion.q;
        
        answerInput.value = '';
        answerInput.disabled = false;
        answerInput.focus();
        
        submitBtn.classList.remove('hidden');
        feedbackContainer.classList.add('hidden');
    }

    function handleSubmit() {
        const rawUserAnswer = answerInput.value;
        const normalizedUserAnswer = normalizeStr(rawUserAnswer);

        if (!rawUserAnswer.trim()) {
            alert('答えを入力してください！');
            return;
        }

        const currentQuestion = currentQuizSet[currentQuestionIndex];
        const isCorrect = currentQuestion.ans.some(answer => 
            normalizeStr(answer) === normalizedUserAnswer
        );

        currentQuestion.userResult = { isCorrect: isCorrect, userAnswer: rawUserAnswer };

        answerInput.disabled = true;
        submitBtn.classList.add('hidden');
        feedbackContainer.classList.remove('hidden');

        updateFeedbackDOM();
    }

    function updateFeedbackDOM() {
        const currentQuestion = currentQuizSet[currentQuestionIndex];
        const isCorrect = currentQuestion.userResult.isCorrect;

        if (isCorrect) {
            feedbackStatus.innerHTML = '<span class="correct">〇 正解！</span>';
            toggleJudgmentBtn.textContent = 'やっぱり不正解にする';
        } else {
            feedbackStatus.innerHTML = '<span class="incorrect">× 不正解</span>';
            toggleJudgmentBtn.textContent = '正解にする';
        }

        feedbackCorrectAns.innerHTML = `あなたの回答: <strong>${currentQuestion.userResult.userAnswer}</strong><br>正解の基準例: ${currentQuestion.ans.join(' / ')}`;
        feedbackExp.innerHTML = `💡<strong>解説:</strong> ${currentQuestion.exp}`;
    }

    function handleToggleJudgment() {
        const currentQuestion = currentQuizSet[currentQuestionIndex];
        currentQuestion.userResult.isCorrect = !currentQuestion.userResult.isCorrect;
        updateFeedbackDOM();
    }

    function handleNext() {
        currentQuestionIndex++;
        if (currentQuestionIndex < currentQuizSet.length) {
            showQuestion();
        } else {
            processQuizEnd(currentQuizSet.length);
        }
    }

    // 途中で退出する処理
    function handleQuit() {
        // まだ解答していない（結果がセットされていない）状態で退出ボタンが押された場合、
        // その問題はスキップされた（解答対象外）として、ここまでの回答済み問題数で計算します。
        let answeredCount = currentQuestionIndex;
        
        // もし現在の問題の解答・判定が終わっている状態（次へボタンが見えている状態）なら、その問題も件数に含める
        if (currentQuizSet[currentQuestionIndex] && currentQuizSet[currentQuestionIndex].userResult) {
            answeredCount = currentQuestionIndex + 1;
        }

        if (answeredCount === 0) {
            // 1問も解かずに戻る場合は履歴を残さずホームへ
            quizScreen.classList.add('hidden');
            homeScreen.classList.remove('hidden');
            return;
        }

        if (confirm(`第 ${answeredCount} 問までの結果を記録してホームに戻りますか？`)) {
            processQuizEnd(answeredCount, true);
        }
    }

    // クイズ終了時のデータ処理共通ロジック
    function processQuizEnd(totalCount, isInterrupted = false) {
        let correctCount = 0;
        
        // 対象の範囲（解答したものまで、または全件）で集計
        for (let i = 0; i < totalCount; i++) {
            const q = currentQuizSet[i];
            if (q.userResult && q.userResult.isCorrect) {
                correctCount++;
                // 正解した場合は「間違えた問題リスト」から除外
                wrongQuizIds = wrongQuizIds.filter(id => id !== q.id);
            } else {
                // 不正解、または解答せず途中でやめた場合は「間違えた問題リスト」に追加
                if (!wrongQuizIds.includes(q.id)) {
                    wrongQuizIds.push(q.id);
                }
            }
        }

        const timeStamp = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        const label = isInterrupted ? "途中終了" : "完了";
        scoreHistory.push(`[${timeStamp}] ${totalCount}問中 ${correctCount}問正解 (${label})`);
        updateHistoryDOM();

        startWrongBtn.disabled = wrongQuizIds.length === 0;

        // 画面遷移
        quizScreen.classList.add('hidden');
        if (isInterrupted) {
            // 途中終了時は直接ホームに戻る
            homeScreen.classList.remove('hidden');
        } else {
            // 全問解き終わった時は結果画面へ
            resultScreen.classList.remove('hidden');
            resultScore.textContent = `全 ${currentQuizSet.length} 問中、 ${correctCount} 問正解！`;
        }
    }

    function updateHistoryDOM() {
        if (scoreHistory.length === 0) {
            historyContainer.textContent = "まだ履歴はありません。";
        } else {
            historyContainer.innerHTML = scoreHistory.map(h => `<div>${h}</div>`).reverse().join('');
        }
    }

    startNormalBtn.addEventListener('click', () => startQuiz('normal'));
    startWrongBtn.addEventListener('click', () => startQuiz('wrong'));
    backHomeBtn.addEventListener('click', () => {
        resultScreen.classList.add('hidden');
        homeScreen.classList.remove('hidden');
    });
    submitBtn.addEventListener('click', handleSubmit);
    answerInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !answerInput.disabled) handleSubmit();
    });
    toggleJudgmentBtn.addEventListener('click', handleToggleJudgment);
    nextBtn.addEventListener('click', handleNext);
    quitBtn.addEventListener('click', handleQuit);
</script>
