<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>保健体育 定期テスト対策アプリ（大修館書店準拠版）</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 30px;
            width: 100%;
            max-width: 650px;
            box-sizing: border-box;
        }
        h1, h2 {
            text-align: center;
            color: #4a90e2;
        }
        .hidden {
            display: none !important;
        }
        button {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            background-color: #4a90e2;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #357abd;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .history-list {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 10px;
        }
        .feedback-area {
            background-color: #fdfdfd;
            border: 2px dashed #ddd;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            text-align: center;
        }
        .correct { color: #2ecc71; font-weight: bold; font-size: 20px; }
        .incorrect { color: #e74c3c; font-weight: bold; font-size: 20px; }
        .exp { font-size: 14px; color: #666; margin-top: 8px; text-align: left; line-height: 1.5; }
        
        .toggle-btn {
            width: auto;
            display: inline-block;
            padding: 6px 12px;
            margin: 10px auto 0 auto;
            font-size: 13px;
            background-color: #6c757d;
        }
        .toggle-btn:hover {
            background-color: #5a6268;
        }
        .quit-btn {
            background-color: #e74c3c;
            margin-top: 25px;
            font-size: 14px;
            padding: 8px;
        }
        .quit-btn:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="home-screen">
        <h1>保健体育 定期テスト対策アプリ</h1>
        <h3 style="text-align: center; color: #666;">〜 中学校「現代の保健体育」範囲 〜</h3>
        <button id="start-normal-btn">通常のクイズを始める</button>
        <button id="start-wrong-btn" disabled>間違えた問題のみ取り組む</button>
        
        <h3>📊 結果の推移</h3>
        <div id="history-container" class="history-list">まだ履歴はありません。</div>
    </div>

    <div id="quiz-screen" class="hidden">
        <h2 id="quiz-progress">第 1 問</h2>
        <p id="quiz-question" style="font-size: 18px; font-weight: bold; line-height: 1.6; white-space: pre-wrap;"></p>
        
        <input type="text" id="answer-input" placeholder="答えを入力してください" autocomplete="off">
        <button id="submit-btn">回答する</button>

        <div id="feedback-container" class="feedback-area hidden">
            <div id="feedback-status"></div>
            <div id="feedback-correct-ans" style="margin-top: 5px; font-size: 14px; line-height: 1.4;"></div>
            <button id="toggle-judgment-btn" class="toggle-btn">判定を覆す</button>
            <div id="feedback-exp" class="exp"></div>
            <button id="next-btn" style="background-color: #2ecc71; margin-top: 15px;">次の問題へ</button>
        </div>

        <button id="quit-btn" class="quit-btn">途中で退出する（ここまでの結果を記録）</button>
    </div>

    <div id="result-screen" class="hidden">
        <h2>結果発表</h2>
        <p id="result-score" style="text-align: center; font-size: 20px; font-weight: bold;"></p>
        <button id="back-home-btn">ホームに戻る</button>
    </div>
</div>

<script>
    const Quiz = [
        // 現代生活と私達の心と体
        { id: 1, q: "次の文章の空欄（  ①  ）にあてはまる適切な語句を答えなさい。\n「現代社会では（  ①  ）機関が発達し、機械化が進みました。その結果、私たちは運動不足になりがちになりました。」", ans: ["交通", "こうつう"], exp: "交通機関や機械化の発達にともない、身体を動かす機会が減少しています。" },
        { id: 2, q: "次の文章の空欄（  ②  ）にあてはまる適切な語句を答えなさい。\n「現代社会では交通機関が発達し、（  ②  ）化が進みました。その結果、私たちは運動不足になりがちになりました。」", ans: ["機械", "きかい"], exp: "生活の利便性や自動化（機械化）が進んだことの裏返しです。" },
        { id: 3, q: "次の文章の空欄（  ③  ）にあてはまる適切な語句を答えなさい。\n「現代社会では交通機関が発達し、機械化が進みました。その結果、私たちは（  ③  ）不足になりがちになりました。」", ans: ["運動", "うんどう"], exp: "日常生活での消費エネルギーが減り、運動不足が問題視されています。" },
        { id: 4, q: "次の文章の空欄（  ①  ）にあてはまる適切な語句を答えなさい。\n「現代社会では（  ①  ）化が進展し、さらに仕事や学習の忙しさ、人間関係の複雑さなどによってストレスを抱えやすくなりました。」", ans: ["情報", "じょうほう"], exp: "情報化社会の急速な進展は、精神的疲労の原因にもなります。" },
        { id: 5, q: "次の文章の空欄（  ②  ）にあてはまる適切な語句を答えなさい。\n「現代社会では情報化が進展し、さらに仕事や学習の忙しさ、（  ②  ）の複雑さなどによってストレスを抱えやすくなりました。」", ans: ["人間関係", "にんげんかんけい"], exp: "社会構造の変化にともない、対人関係の悩みや複雑さが増しています。" },
        { id: 6, q: "次の文章の空欄（  ③  ）にあてはまる適切な語句を答えなさい。\n「現代社会では情報化が進展し、さらに仕事や学習の忙しさ、人間関係の複雑さなどによって（  ③  ）を抱えやすくなりました。」", ans: ["ストレス"], exp: "心身に過度な負担がかかった状態（ストレス）を招きやすくなっています。" },
        
        // 生活を豊かにするスポーツ
        { id: 7, q: "次の文章の空欄（  ①  ）にあてはまる適切な語句を答えなさい。\n「スポーツに親しむことによって、健康な（  ①  ）を作ったり、新たな自分との出会いや、豊かな交流を行うことができます。」", ans: ["心と体", "心や体"], exp: "スポーツは心身のすこやかな成長と健康維持に大きく貢献します。" },
        { id: 8, q: "次の文章の空欄（  ②  ）にあてはまる適切な語句を答えなさい。\n「スポーツに親しむことによって、健康な心と体を作ったり、（  ②  ）自分との出会いや、豊かな交流を行うことができます。」", ans: ["新しい", "新たな"], exp: "挑戦を通じて、自分の新しい可能性や能力を発見できます。" },
        { id: 9: q: "「国連教育科学文化機関」のアルファベット5文字の略称を、すべて大文字で書きなさい。", ans: ["UNESCO"], exp: "UNESCO（ユネスコ）は、国際連合の専門機関の一つです。" },
        { id: 10, q: "UNESCO（国連教育科学文化機関）の憲章において、スポーツはすべての人々にとってどのようなものであると呼びかけられているか。「基本的（  ①  ）」の空欄にあてはまる適切な漢字2文字を答えなさい。", ans: ["権利", "けんり"], exp: "スポーツを行うことは、人種や性別を問わず「基本的権利」と位置づけられています。" },
        { id: 11, q: "UNESCOの国際憲章において、すべての人々の基本的権利として挙げられている3つの実践活動を、教科書に倣って『〇〇、身体活動、〇〇の実践』の〇〇にあてはまる語句を読点（、）で繋いで答えなさい。", ans: ["体育、スポーツ"], exp: "「体育、身体活動、スポーツの実践」が基本的権利とされています。" },
        { id: 12, q: "2011年に制定された、日本におけるスポーツに関する施策の基本事項を定め、スポーツを国民の権利として位置づけた法律の名称を答えなさい。", ans: ["スポーツ基本法"], exp: "スポーツ振興法を50年ぶりに全面的に改正してできた法律です。" },
        { id: 13, q: "スポーツ基本法に基づき、日本のスポーツ政策の方向性を定めるために国が策定する計画の名称を答えなさい。", ans: ["スポーツ基本計画"], exp: "文部科学大臣が策定する、スポーツ施策を推進するための重要計画です。" },

        // 感染症と病原体
        { id: 14, q: "ウイルスや細菌など、体に侵入して病気を引き起こす目に見えない小さな生物を総称して何というか、答えなさい。", ans: ["病原体", "びょうげんたい"], exp: "細菌、ウイルス、菌類などがこれに該当します。" },
        { id: 15, q: "病原体が体内に侵入し、そこで増殖することを何というか、漢字2文字で答えなさい。", ans: ["感染", "かんせん"], exp: "単に付着するだけでなく、体内で増えることを「感染」と言います。" },
        { id: 16, q: "病原体が体に侵入してから、実際に体に症状が現れるまでの期間を何というか、答えなさい。", ans: ["潜伏期間", "せんぷきかん"], exp: "病原体の種類によって、数時間から数年まで幅があります。" },
        { id: 17, q: "潜伏期間を経て、体に異常（症状）が出ることを何というか、漢字2文字で答えなさい。", ans: ["発病", "はつびょう"], exp: "感染しても、症状が出ない場合は「不顕性感染」と呼びます。" },
        { id: 18, q: "病原体が体に侵入し、増殖して引き起こされる病気の総称を何というか、答えなさい。", ans: ["感染症", "かんせんしょう"], exp: "大修館書店の教科書でも主要なテーマとして扱われています。" },
        { id: 19, q: "感染症の主な感染経路のうち、大修館の教科書に記載されている4つの代表例を答えなさい。※解答は『飛沫感染、接触感染、空気感染、経口感染』の順に、読点（、）で繋いで入力しなさい。", ans: ["飛沫感染、接触感染、空気感染、経口感染"], exp: "病原体が体に入るルートを遮断することが感染経路の対策になります。" },
        
        // 感染症の症状と潜伏期間
        { id: 20, q: "インフルエンザに感染した際、風邪に比べて急激に現れる、38度以上の特徴的な身体症状を漢字2文字で答えなさい。", ans: ["発熱", "こうねつ"], exp: "突発的な高熱、関節痛、全身の倦怠感が特徴です。" },
        { id: 21, q: "インフルエンザの一般的な潜伏期間は何日〜何日か。「〇〜〇日」の形式で答えなさい。", ans: ["1〜3日", "1-3日"], exp: "インフルエンザは非常に潜伏期間が短く、急速に発症します。" },
        { id: 22, q: "麻しん（はしか）に感染した際、高熱とともに皮膚に現れる、特有の赤いぶつぶつを何というか、漢字2文字で答えなさい。", ans: ["発疹", "発しん"], exp: "麻しんでは全身に強い発疹が現れるのが特徴です。" },
        { id: 23, q: "麻しん（はしか）の一般的な潜伏期間はおよそ何日〜何日か。「〇〜〇日」の形式で答えなさい。", ans: ["10〜12日", "10-12日"], exp: "約10日前後の潜伏期間を経て発症します。" },
        { id: 24, q: "風しんに感染した際、発熱や発疹とともに、耳の後ろや首の後ろにある何という組織が腫れるか、カタカナと漢字を交えて答えなさい。", ans: ["リンパ節"], exp: "首の後ろなどのリンパ節が腫れて痛むのが風しんの特徴です。" },
        { id: 25, q: "風しんの一般的な潜伏期間はおよそ何日〜何日か。「〇〜〇日」の形式で答えなさい。", ans: ["14〜21日", "14-21日"], exp: "およそ2〜3週間（21日前後）の潜伏期間があります。" },
        { id: 26, q: "結核に感染し発病した際、長期間（2週間以上）続く特徴的な呼吸器系の症状を漢字1文字で答えなさい。", ans: ["咳", "せき"], exp: "長引く激しい咳や痰、微熱が続く場合は結核が疑われます。" },
        { id: 27, q: "結核の潜伏期間の特徴として、他の感染症と異なりどのような長さになるか。空欄にあてはまる語句を答えなさい。「数か月から（  ①  ）以上におよぶこともある」", ans: ["10年", "十年"], exp: "結核菌は体内で眠り続け、数年〜数十年後に発病することがあります。" },
        { id: 28, q: "ノロウイルスなどによる感染性胃腸炎の主な症状として、激しくお腹を下す状態を漢字2文字で答えなさい。", ans: ["下痢", "げり"], exp: "突発的な激しい嘔吐や下痢、腹痛を引き起こします。" },
        { id: 29, q: "感染性胃腸炎（ノロウイルスなど）の一般的な潜伏期間は何日〜何日か。「〇〜〇日」の形式で答えなさい。", ans: ["1〜2日", "1-2日"], exp: "非常に短い潜伏期間で、急激に症状が出現します。" },
        { id: 30, q: "コレラに感染した際、特徴的に見られる、米のとぎ汁のような状態になる激しい消化器症状を漢字2文字で答えなさい。", ans: ["下痢", "げり"], exp: "大量の水様便（下痢）による重度の脱水症状が起こります。" },
        { id: 31, q: "コレラの一般的な潜伏期間はおよそ何日か。「〇日」の形式で答えなさい。", ans: ["1日", "一日"], exp: "コレラ菌は非常に定着が早く、およそ1日ほどで発症します。" },
        { id: 32, q: "蚊が媒介するマラリアに感染した際、周期的に襲ってくる特徴的な身体症状を漢字2文字で答えなさい。", ans: ["高熱", "発熱"], exp: "悪寒とともに周期的に猛烈な高熱を繰り返すのが特徴です。" },
        { id: 33, q: "マラリアの一般的な潜伏期間は、およそ何週間以上か。「〇週間」の形式で答えなさい。", ans: ["1週間", "一週間"], exp: "一般的には1〜3週間ほど経ってから発症します。" },
        { id: 34, q: "ヒトスジシマカなどが媒介するデング熱に感染した際、急激な発熱とともに皮膚に現れる症状を漢字2文字で答えなさい。", ans: ["発疹", "発しん"], exp: "激しい頭痛や筋肉痛とともに、特有の発疹が現れます。" },
        { id: 35, q: "デング熱の一般的な潜伏期間はおよそ何日〜何日か。「〇〜〇日」の形式で答えなさい。", ans: ["2〜14日", "2-14日"], exp: "蚊に刺されてからおよそ2日から2週間以内に発症します。" },
        { id: 36, q: "新型コロナウイルス感染症（COVID-19）において、重症化した際に見られる、呼吸が非常に苦しくなる状態を漢字4文字で答えなさい。", ans: ["呼吸困難"], exp: "肺に強い炎症が起きると、酸素が取り込めず呼吸困難に陥ります。" },
        { id: 37, q: "COVID-19の一般的な潜伏期間はおよそ何日〜何日か。「〇〜〇日」の形式で答えなさい。", ans: ["1〜14日", "1-14日"], exp: "ウイルス株によって前後しますが、最大で約14日間とされています。" },

        // 免疫・抵抗力
        { id: 38, q: "病原体が体内に侵入するのを防いだり、侵入した病原体を排除したりする、私たちの体に備わっている力を何というか、答えなさい。", ans: ["抵抗力", "たいこうりょく"], exp: "心身の健康状態が良いと、この抵抗力が高く維持されます。" },
        { id: 39, q: "私たちの体の「抵抗力」が低下しているとき、体にはどのような影響が出やすくなるか。空欄を漢字とひらがなで埋めなさい。「病原体に（  ①  ）やすくなる。」", ans: ["感染し", "かんせんし"], exp: "抵抗力が落ちると、普段なら跳ね返せる病原体に感染しやすくなります。" },
        { id: 40, q: "抵抗力の中心となる働きで、体内に侵入した特定の病原体を記憶し、それを排除する生体防御の仕組みを何というか、漢字2文字で答えなさい。", ans: ["免疫", "めんえき"], exp: "生体が持つ自己防衛システムそのものを免疫と呼びます。" },
        { id: 41, q: "特定の病原体に一度感染した経験（または予防接種）によって、私たちの体内にある免疫の機能はどうなるか。漢字2文字で答えなさい。", ans: ["強化", "きょうか"], exp: "二度目の侵入に備えて、一度戦った相手への防衛力が強まります。" },
        { id: 42, q: "病原体が体内に侵入したとき、血液中でそれらを取り込んで処理（食菌）したり、排除のための指令を出す生体防御の主役となる細胞の総称を答えなさい。", ans: ["白血球", "はっけっきゅう"], exp: "白血球やその仲間（リンパ球など）が病原体と戦います。" },
        { id: 43, q: "白血球の仲間（リンパ球）が、体内に侵入した特定の病原体に対抗し、その働きを弱めたり無力化したりするために作り出すピンポイントの防衛物質を何というか、漢字2文字で答えなさい。", ans: ["抗体", "こうたい"], exp: "病原体（抗原）にピッタリ結合して無力化する武器が「抗体」です。" },
        { id: 44, q: "一度抗体を作った病原体の情報を体が記憶し、再び同じ病原体が侵入したときに素早く排除する私たちの体の仕組みを何というか、漢字2文字で答えなさい。", ans: ["免疫", "めんえき"], exp: "一度目の戦いの記憶により、二度目は発病前に叩き潰すことができます。" },
        { id: 45, q: "体内で一度免疫の仕組みが働くと、体の中（リンパ球など）にはその病原体に対する何が残るか。漢字2文字で答えなさい。", ans: ["記憶", "きおく"], exp: "この「免疫記憶」があるため、同じ病気に何度もかからなくなります。" },
        { id: 46, q: "過去に一度感染したことのある病原体が再び体内に侵入してきたとき、体の中の免疫の仕組みはどのように動くか。空欄にあてはまる適切な語句を答えなさい。「記憶に基づき、（  ①  ）病原体を排除する。」", ans: ["速やかに", "すみやかに"], exp: "初犯の敵より、すでに手配書（記憶）がある敵のほうが迅速に処理されます。" },
        
        // 生活習慣・環境・予防接種
        { id: 47, q: "体の抵抗力を高める生活習慣として、日頃の食事においてはどのような内容を心がければよいか。「（  ①  ）のよい食事」の空欄にあてはまる言葉を答えなさい。", ans: ["バランス", "ばらんす"], exp: "栄養が偏ると免疫細胞の働きが鈍くなってしまいます。" },
        { id: 48, q: "体の抵抗力を高める生活習慣として、睡眠や休養においてはどのような内容を心がければよいか。漢字2文字で答えなさい。「（  ①  ）な睡眠・休養」", ans: ["適切", "てきせつ"], exp: "しっかり脳と体を休ませて疲労を抜くことが抵抗力に繋がります。" },
        { id: 49, q: "体の抵抗力を高める生活習慣として、運動においてはどのような内容を心がければよいか。漢字2文字で答えなさい。「（  ①  ）な運動」", ans: ["適度", "てきど"], exp: "激しすぎる運動は逆に免疫を下げます。心地よい「適度」が大切です。" },
        { id: 50, q: "私たちの体の抵抗力を低下させる原因となる、過度な活動（体への過度な負担）を2つ、読点（、）で繋げて答えなさい。※解答は『〇〇、労働』の順に答えなさい。", ans: ["運動、労働"], exp: "オーバーワーク（過度な運動・過度な労働）は疲労を溜め、抵抗力を下げます。" },
        { id: 51, q: "私たちの体の抵抗力を低下させる原因となる、精神的な過度な負荷を何というか、答えなさい。", ans: ["ストレス"], exp: "不安や悩みが長引くと自律神経が乱れ、免疫機能が低下します。" },
        { id: 52, q: "私たちの体の抵抗力を低下させる原因となる不適切な行為には、飲酒や喫煙のほかに、絶対にしてはならない法律で厳しく禁止されている危険な習慣があります。これを何というか、漢字4文字で答えなさい。", ans: ["薬物乱用", "やくぶつらんよう"], exp: "【大修館書店準拠】覚醒剤や大麻などの薬物乱用は、脳や心身を破壊し抵抗力を激しく低下させます。" },
        { id: 53, q: "社会全体で感染症のリスクを低下させるために、医療の面において国や自治体が充実・普及させるべき制度を2つ答えなさい。※解答は『治療法、〇〇法』の順に、読点（、）で繋いで入力しなさい。", ans: ["治療法、予防法"], exp: "医学の進歩にともなう治療・予防の普及が社会防衛になります。" },
        { id: 54, q: "社会全体で感染症のリスクを低下させるために、人々の生活の土台となる環境として国や自治体が改善していくべきものを2つ答えなさい。※解答は『栄養環境、〇〇環境』の順に、読点（、）で繋いで入力しなさい。", ans: ["栄養環境、労働環境"], exp: "生活環境や働く環境の衛生・健康水準を高める必要があります。" },
        { id: 55, q: "あらかじめ安全な状態にした病原体（ワクチン）などを体内に入れ、免疫の仕組みを利用して特定の病気に対する抗体を作らせる医療行為を何というか、答えなさい。", ans: ["予防接種", "よぼうせっしゅ"], exp: "あらかじめ体に練習をさせて、本物の侵入時に発病を防ぐ手段です。" },
        { id: 56, q: "予防接種を受けた本人には、どのような医学的な効果が現れるか。空欄をひらがなで埋めなさい。「感染しにくくなるだけでなく、感染しても（  ①  ）にくくなる。」", ans: ["はつびょうし", "発病し"], exp: "発病の防止や、もし発病しても重症化を防ぐ効果があります。" },
        { id: 57, q: "日本の予防接種において、個人の判断や希望、または流行状況に応じて各自で行う「インフルエンザ」などの接種区分を何というか、漢字2文字で答えなさい。", ans: ["任意", "にんい"], exp: "インフルエンザの予防接種は、原則として個人の希望による「任意」接種です。" },
        { id: 58, q: "日本の予防接種において、法律（予防接種法）に基づき、集団感染の予防を目的として原則全員が受けることとされている「麻しん・風しん」などの接種区分を何というか、漢字2文字で答えなさい。", ans: ["定期", "ていき"], exp: "社会全体の流行を防ぐために推奨されているのが「定期」接種です。" },
        { id: 59, q: "日本の予防接種において、乳幼児期の重症化を防ぐための「結核（BCG）」の接種区分は「定期」「任意」のどちらに該当するか、答えなさい。", ans: ["定期", "ていき"], exp: "BCG（結核予防）は定期接種のスケジュールに含まれます。" },
        { id: 60, q: "インフルエンザの予防接種を受けるタイミングについて、いつ受けるのが適切か、答えなさい。 「毎シーズン（  ①  ）前」", ans: ["流行", "りゅうこう"], exp: "抗体ができるまでに時間がかかるため、毎年冬の流行が始まる前に受けます。" },
        { id: 61, q: "麻しん（はしか）・風しんの定期予防接種は、免疫をより確実にするために、子どもの成長過程において合計何回受けることになっているか。数字と「回」を組み合わせて答えなさい（例：5回）。", ans: ["2回", "二回"], exp: "1歳時と、小学校入学前の1年間の計2回受けるのが標準です。" },
        { id: 62, q: "結核（BCG）の定期予防接種は、生後1歳に達するまでの期間に、合計何回受けることになっているか。数字と「回」を組み合わせて答えなさい（例：5回）。", ans: ["1回", "一回"], exp: "乳幼児期の重症な結核を防ぐため、生後1年未満の時期に1回接種します。" },
        { id: 63, q: "インフルエンザワクチンは、その年に流行すると予測されるウイルスの型に合わせて、一般的に何種類程度のウイルス株に対応する内容で作られているか。数字と「種類」を組み合わせて答えなさい（例：10種類）。", ans: ["4種類", "四種類"], exp: "通常、A型2種・B型2種の計4種類に対応するワクチンが作られます。" },
        { id: 64, q: "麻しん・風しんの定期予防接種では、2つの病気のワクチンを一度に接種できる効率的なワクチンが使われます。これを何というか。「（  ①  ）ワクチン」の空欄に漢字2文字を入れなさい。", ans: ["混合", "こんごう"], exp: "麻しん・風しん混合（MR）ワクチンが使用されています。" },
        { id: 65, q: "結核（BCG）の予防接種は、9本の管針を皮膚に押し当てる独特の形状をしています。その見た目から広く親しまれている俗称を何というか、答えなさい。 「（  ①  ）注射」", ans: ["はんこ", "ハンコ"], exp: "スタンプを捺すように接種するため、「はんこ注射」と呼ばれます。" },

        // 三大対策
        { id: 66, q: "感染症の流行を防ぐための3つの原則（対策）を、大修館の教科書の見出し通りに『〇〇の対策、〇〇の対策、〇〇を高める対策』の形で、読点（、）で繋いで答えなさい。", ans: ["感染源の対策、感染経路の対策、体の抵抗力を高める対策", "感染源の対策、感染経路の対策、体の抵抗力を高める"], exp: "【大修館書店準拠】感染源・感染経路・体の抵抗力の3つの連鎖を断ち切ることが鉄則です。" },
        { id: 67, q: "病原体をなくしたり、他の人へうつさないようにしたりする、根源へのアプローチを『（  ①  ）の対策』という。空欄にあてはまる適切な語句を漢字3文字で答えなさい。", ans: ["感染源", "かんせんげん"], exp: "大修館書店では病原体の潜む場所やそのものを処理することを「感染源の対策」と言います。" },
        { id: 68, q: "感染源の対策として、食品に付着した病原体を死滅・無力化させるために、調理時に行う最も一般的な行為を漢字2文字で答えなさい。", ans: ["加熱", "かねつ"], exp: "食品の中心部まで十分に「加熱」することが最大の感染源対策です。" },
        { id: 69, q: "感染源の対策として、調理器具や手指に付着した病原体を死滅・除去する衛生行為を漢字2文字で2つ、読点（、）で繋げて答えなさい。※解答は『殺菌、〇〇』の順に答えなさい。", ans: ["殺菌、消毒"], exp: "熱湯やアルコール、塩素系消毒剤を用いた「殺菌」や「消毒」がこれにあたります。" },
        { id: 70, q: "病原体が他の人や環境から、私たちの体内へと侵入してくるまでのすべての道すじを何というか、漢字4文字で答えなさい。", ans: ["感染経路", "かんせんけいろ"], exp: "道すじを遮断する行為が、手洗いやマスク、換気になります。" },
        { id: 71, q: "感染経路の対策において、様々なものに触れることで病原体を自分の目や鼻、口へと運んでしまいがちな、私たちの身体の部位を漢字1文字で答えなさい。", ans: ["手", "て"], exp: "「手」を介した接触感染が非常に多いため、手洗いが極めて重要です。" },
        { id: 72, q: "部屋の中に浮遊する病原体の濃度を下げ、感染をせき止めるための感染経路の対策として、窓を開けて空気を入れ替える行為を漢字2文字で答えなさい。", ans: ["換気", "かんき"], exp: "室内の空気を入れ替える「換気」は、空気感染や飛沫感染の優れた防衛策です。" },
        { id: 73, q: "感染経路の対策において、マスクの着用や手洗いを行う最も直接的な目的は、病原体を体内にどうさせないためか。漢字2文字で答えなさい。", ans: ["侵入", "しんにゅう"], exp: "病原体を体の中に「侵入」させないために、道すじの各所でブロックします。" },
        { id: 74, q: "感染症対策の3つ目である、病原体が体内に侵入しても発病を防いだり軽症で済ませたりするための対策を『（  ①  ）の対策』という。空欄にあてはまる適切な語句を答えなさい。", ans: ["体の抵抗力を高める", "体の抵抗力を高める対策"], exp: "予防接種や普段の健康的な生活習慣によって、感受性を下げる対策です。" },

        // 発病後の対応・性感染症
        { id: 75, q: "万が一感染症にかかってしまった場合、速やかに医療機関を受診し、何を受けることにより、安全かつ確実に回復することができるか。「適切な（  ①  ）」の空欄にあてはまる漢字2文字を答えなさい。", ans: ["治療", "ちりょう"], exp: "専門の医師による「適切な治療」が回復への一番の近道です。" },
        { id: 76, q: "感染症にかかった際、早期に発見して速やかに治療を開始することは、周囲へのどのようなリスクを減らすことにつながるか。「（  ①  ）の拡大」の空欄に漢字2文字を入れなさい。", ans: ["感染", "かんせん"], exp: "自分が早く治るだけでなく、周りの人にうつす（感染の拡大）のを防げます。" },
        { id: 77, q: "感染症にかかって自宅で静養する際、体の免疫系が病原体と戦うのをサポートするために最も必要な心がけを漢字2文字で答えなさい。", ans: ["休養", "きゅうよう"], exp: "睡眠や横になって「休養」をとることで、エネルギーを免疫に集中させます。" },
        { id: 78, q: "自分に感染症の症状があり体調が悪いとき、学校などへ無理して行かず、周囲へ病気を広げないためにとるべき行動を答えなさい。 「学校を（  ①  ）」", ans: ["休む", "やすむ"], exp: "周囲への感染拡大を防ぐため、出席停止措置などがとられる場合もあります。" },
        { id: 79, q: "学校内で特定の感染症（インフルエンザなど）が集団発生した際、流行を物理的に防止するために、学校側がクラス単位などで行う措置を何というか、漢字4文字で答えなさい。", ans: ["学級閉鎖", "がっきゅうへいさ"], exp: "集団が集まるのを一時的に止めて、感染の連鎖を断ち切る強力な措置です。" },
        { id: 80, q: "主に性的接触を介して、感染者の体液に含まれる病原体が互いの粘膜などから侵入することで感染する病気の総称を何というか、漢字3文字で答えなさい。", ans: ["性感染症", "せいかんせんしょう"], exp: "大修館の教科書でも1つの独立した大きな節として詳しく解説されています。" },
        { id: 81, q: "性感染症の初期症状として、性器の皮膚や粘膜が深くただれる症状を何というか、漢字2文字で答えなさい。", ans: ["潰瘍", "かいよう"], exp: "性器ヘルペスや梅毒などで、局所に「潰瘍」が見られることがあります。" },
        { id: 82, q: "性感染症を治療せずに放置すると、炎症が奥へ進行し、将来的に男女ともに子どもができにくくなる重大な身体的問題の原因になります。これを漢字2文字で答えなさい。", ans: ["不妊", "ふにん"], exp: "自覚症状がなくても卵管や精管が詰まり、「不妊」の原因になります。" },
        { id: 83, q: "妊娠している母親が性感染症にかかっている場合、胎盤や出産時の産道、母乳などを通して子どもに病原体がうつってしまう現象を何というか、漢字4文字で答えなさい。", ans: ["母子感染", "ぼしかんせん"], exp: "生まれてくる赤ちゃんを守るためにも、事前の検査と治療が必要です。" },
        { id: 84, q: "性感染症の疑いがあるとき、恥ずかしさなどの心理的理由から遅れがちになる、医療機関で行うべき2つの行動（病気の有無を調べること、および病気を治すこと）を読点（、）で繋いで答えなさい。※解答は『〇〇、治療』の順に答えなさい。", ans: ["検査、治療"], exp: "「検査」や「治療」を躊躇している間に、周囲へ拡大してしまう危険があります。" },
        { id: 85, q: "性感染症に感染しても自覚症状が無い場合、本人が気づかないまま病原体をうつしてしまう危険性がある、交際している特定の相手をカタカナで何というか、答えなさい。", ans: ["パートナー"], exp: "自覚がないまま「パートナー」を傷つけてしまうのが性感染症の怖さです。" },
        { id: 86, q: "性的接触によって感染する病気（性感染症）は、現在世界においておよそ何種類ほど確認されているか。数字と「種類」を組み合わせて答えなさい（例：50種類）。", ans: ["20種類", "約20種類"], exp: "およそ20種類以上の多様な病原体による疾患が知られています。" },
        { id: 87, q: "日本で報告数の多い、大修館の教科書に記載されている代表的な3つの性感染症を答えなさい。※解答は『クラミジア、淋菌、〇〇〇〇〇』の形式を参考に、3つを読点（、）で繋いで入力しなさい。", ans: ["クラミジア、淋菌、性器ヘルペス", "性器クラミジア感染症、淋菌感染症、性器ヘルペスウイルス感染症"], exp: "「性器クラミジア感染症」「淋菌感染症」「性器ヘルペスウイルス感染症」が主要例です。" },
        { id: 88, q: "日本国内で最も感染報告数が多い「性器クラミジア感染症」の、一般的な潜伏期間は何週間〜何週間か。「〇〜〇週間」の形式で答えなさい。", ans: ["1〜3週間", "1-3週間"], exp: "感染から発症まで、1〜3週間と比較的ながい時間がかかります。" },
        { id: 89, q: "性器クラミジア感染症に感染した女性において、治療が遅れる最大の要因となる特徴（体にどのような自覚があるか、またはないか）を簡潔に答えなさい。 「（  ①  ）がないことが多い」", ans: ["自覚症状", "じかくしょうじょう"], exp: "女性の約8割にほとんど「自覚症状」がないため、放置されやすいです。" },
        { id: 90, q: "性器クラミジア感染症に感染した男性の主な初期症状として、おしっこをするときに尿道に現れる特徴を漢字とひらがなを交えて答えなさい。 「排尿時の（  ①  ）」", ans: ["痛み", "いたみ"], exp: "尿道から軽い膿が出たり、排尿時に不快な「痛み」を覚えることがあります。" },
        { id: 91, q: "性感染症の一つである「淋菌感染症」の、一般的な潜伏期間は何日〜何日か。「〇〜〇日」の形式で答えなさい。", ans: ["2〜9日", "2-9日"], exp: "クラミジアに比べて潜伏期間が短く、数日で症状が出ます。" },
        { id: 92, q: "淋菌感染症に感染した女性の症状は、男性に比べて非常に軽いため、治療が遅れがちになります。この状態を説明した次の空欄を埋めなさい。 「女性は（  ①  ）ないことが多い。」", ans: ["自覚症状が", "症状が出"], exp: "女性は症状に気づきにくく、そのまま不妊症などへ悪化することがあります。" },
        { id: 93, q: "淋菌感染症に感染した男性の顕著な初期症状として、尿道から激しい痛みとともに出てくる特徴的な分泌物を漢字1文字で答えなさい。", ans: ["膿", "うみ"], exp: "男性の場合は、尿道から黄白色の激しい「膿」が出て猛烈に痛みます。" },
        { id: 94, q: "「性器ヘルペスウイルス感染症」の一般的な潜伏期間は何日〜何日か。「〇〜〇日」の形式で答えなさい。", ans: ["2〜10日", "2-10日"], exp: "ウイルスに感染後、2〜10日ほどで性器周辺に症状が出ます。" },
        { id: 95, q: "性器ヘルペスウイルス感染症を発症した際、性器やその周辺に現れる特徴的な、中に水がたまったぶつぶつを何というか、答えなさい。", ans: ["水ぶくれ", "みずぶくれ"], exp: "強い痛みをともなう複数の「水ぶくれ（水疱）」ができるのが特徴です。" },
        { id: 96, q: "性感染症の感染を未然に防ぐために、性的接触の際に最初から最後まで正しく使用すべき避妊具の名称をカタカナで答えなさい。", ans: ["コンドーム"], exp: "粘膜同士の直接の接触を遮断する「コンドーム」の正しい使用が極めて有効です。" },
        { id: 97, q: "性感染症の疑いがある場合、お互いの再感染（ピンポン感染）を防ぐために、医療機関へは誰と一緒に受診すべきか、答えなさい。", ans: ["パートナー"], exp: "片方だけが治っても、もう片方から再感染するため、「パートナー」との同時治療が必須です。" },
        { id: 98, q: "性感染症を広げないために、私たち一人ひとりが日頃から正しい知識を持ち、感染を未然に防ぐための行動をとることが大切です。この『未然に防ぐこと』を漢字2文字で何というか、答えなさい。", ans: ["予防", "よぼう"], exp: "正しい意思決定と適切な行動選択による「予防」が、最大の武器になります。" }
    ];

    // --- JavaScriptのロジックは以前の優れた機能を完全維持 ---
    let currentQuizSet = []; 
    let currentQuestionIndex = 0; 
    let wrongQuizIds = []; 
    let scoreHistory = []; 

    const homeScreen = document.getElementById('home-screen');
    const quizScreen = document.getElementById('quiz-screen');
    const resultScreen = document.getElementById('result-screen');
    
    const startNormalBtn = document.getElementById('start-normal-btn');
    const startWrongBtn = document.getElementById('start-wrong-btn');
    const backHomeBtn = document.getElementById('back-home-btn');
    const submitBtn = document.getElementById('submit-btn');
    const quitBtn = document.getElementById('quit-btn');
    
    const quizProgress = document.getElementById('quiz-progress');
    const quizQuestion = document.getElementById('quiz-question');
    const answerInput = document.getElementById('answer-input');
    
    const feedbackContainer = document.getElementById('feedback-container');
    const feedbackStatus = document.getElementById('feedback-status');
    const feedbackCorrectAns = document.getElementById('feedback-correct-ans');
    const toggleJudgmentBtn = document.getElementById('toggle-judgment-btn');
    const feedbackExp = document.getElementById('feedback-exp');
    const nextBtn = document.getElementById('next-btn');

    const resultScore = document.getElementById('result-score');
    const historyContainer = document.getElementById('history-container');

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function toHalfWidth(str) {
        return str.replace(/[Ａ-Ｚａ-ｚ０-９]/g, function(s) {
            return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
        }).replace(/[〜－ー]/g, '-').replace(/[、，]/g, ','); 
    }

    function normalizeStr(str) {
        if (!str) return '';
        return toHalfWidth(str.toString().trim().toLowerCase()).replace(/\s+/g, '');
    }

    function startQuiz(mode) {
        if (mode === 'normal') {
            currentQuizSet = [...Quiz];
        } else if (mode === 'wrong') {
            currentQuizSet = Quiz.filter(q => wrongQuizIds.includes(q.id));
        }

        currentQuizSet = shuffleArray(currentQuizSet);
        currentQuestionIndex = 0;
        currentQuizSet.forEach(q => delete q.userResult);

        homeScreen.classList.add('hidden');
        resultScreen.classList.add('hidden');
        quizScreen.classList.remove('hidden');
        
        showQuestion();
    }

    function showQuestion() {
        const currentQuestion = currentQuizSet[currentQuestionIndex];
        quizProgress.textContent = `第 ${currentQuestionIndex + 1} 問 / 全 ${currentQuizSet.length} 問`;
        quizQuestion.textContent = currentQuestion.q;
        
        answerInput.value = '';
        answerInput.disabled = false;
        answerInput.focus();
        
        submitBtn.classList.remove('hidden');
        feedbackContainer.classList.add('hidden');
    }

    function handleSubmit() {
        const rawUserAnswer = answerInput.value;
        const normalizedUserAnswer = normalizeStr(rawUserAnswer);

        if (!rawUserAnswer.trim()) {
            alert('答えを入力してください！');
            return;
        }

        const currentQuestion = currentQuizSet[currentQuestionIndex];
        const isCorrect = currentQuestion.ans.some(answer => 
            normalizeStr(answer) === normalizedUserAnswer
        );

        currentQuestion.userResult = { isCorrect: isCorrect, userAnswer: rawUserAnswer };

        answerInput.disabled = true;
        submitBtn.classList.add('hidden');
        feedbackContainer.classList.remove('hidden');

        updateFeedbackDOM();
    }

    function updateFeedbackDOM() {
        const currentQuestion = currentQuizSet[currentQuestionIndex];
        const isCorrect = currentQuestion.userResult.isCorrect;

        if (isCorrect) {
            feedbackStatus.innerHTML = '<span class="correct">〇 正解！</span>';
            toggleJudgmentBtn.textContent = 'やっぱり不正解にする';
        } else {
            feedbackStatus.innerHTML = '<span class="incorrect">× 不正解</span>';
            toggleJudgmentBtn.textContent = '正解にする';
        }

        feedbackCorrectAns.innerHTML = `あなたの回答: <strong>${currentQuestion.userResult.userAnswer}</strong><br>正解の基準例: ${currentQuestion.ans.join(' / ')}`;
        feedbackExp.innerHTML = `💡<strong>解説:</strong> ${currentQuestion.exp}`;
    }

    function handleToggleJudgment() {
        const currentQuestion = currentQuizSet[currentQuestionIndex];
        currentQuestion.userResult.isCorrect = !currentQuestion.userResult.isCorrect;
        updateFeedbackDOM();
    }

    function handleNext() {
        currentQuestionIndex++;
        if (currentQuestionIndex < currentQuizSet.length) {
            showQuestion();
        } else {
            processQuizEnd(currentQuizSet.length);
        }
    }

    function handleQuit() {
        let answeredCount = currentQuestionIndex;
        if (currentQuizSet[currentQuestionIndex] && currentQuizSet[currentQuestionIndex].userResult) {
            answeredCount = currentQuestionIndex + 1;
        }

        if (answeredCount === 0) {
            quizScreen.classList.add('hidden');
            homeScreen.classList.remove('hidden');
            return;
        }

        if (confirm(`第 ${answeredCount} 問までの結果を記録してホームに戻りますか？`)) {
            processQuizEnd(answeredCount, true);
        }
    }

    function processQuizEnd(totalCount, isInterrupted = false) {
        let correctCount = 0;
        
        for (let i = 0; i < totalCount; i++) {
            const q = currentQuizSet[i];
            if (q.userResult && q.userResult.isCorrect) {
                correctCount++;
                wrongQuizIds = wrongQuizIds.filter(id => id !== q.id);
            } else {
                if (!wrongQuizIds.includes(q.id)) {
                    wrongQuizIds.push(q.id);
                }
            }
        }

        const timeStamp = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        const label = isInterrupted ? "途中終了" : "完了";
        scoreHistory.push(`[${timeStamp}] ${totalCount}問中 ${correctCount}問正解 (${label})`);
        updateHistoryDOM();

        startWrongBtn.disabled = wrongQuizIds.length === 0;

        quizScreen.classList.add('hidden');
        if (isInterrupted) {
            homeScreen.classList.remove('hidden');
        } else {
            resultScreen.classList.remove('hidden');
            resultScore.textContent = `全 ${currentQuizSet.length} 問中、 ${correctCount} 問正解！`;
        }
    }

    function updateHistoryDOM() {
        if (scoreHistory.length === 0) {
            historyContainer.textContent = "まだ履歴はありません。";
        } else {
            historyContainer.innerHTML = scoreHistory.map(h => `<div>${h}</div>`).reverse().join('');
        }
    }

    startNormalBtn.addEventListener('click', () => startQuiz('normal'));
    startWrongBtn.addEventListener('click', () => startQuiz('wrong'));
    backHomeBtn.addEventListener('click', () => {
        resultScreen.classList.add('hidden');
        homeScreen.classList.remove('hidden');
    });
    submitBtn.addEventListener('click', handleSubmit);
    answerInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !answerInput.disabled) handleSubmit();
    });
    toggleJudgmentBtn.addEventListener('click', handleToggleJudgment);
    nextBtn.addEventListener('click', handleNext);
    quitBtn.addEventListener('click', handleQuit);
</script>

</body>
</html>
